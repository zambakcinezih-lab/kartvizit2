<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nezih Zambakcı - Dijital Kartvizit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Kozmik Toz Animasyonlu Arka Plan */
        body { 
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; position: relative;
        }

        .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .particle { position: absolute; background: rgba(255, 255, 255, 0.5); border-radius: 50%; animation: float 20s infinite linear; }
        @keyframes float {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
        }

        .card { 
            background: rgba(20, 20, 20, 0.85); padding: 40px 30px; border-radius: 30px; 
            text-align: center; width: 300px; border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px rgba(0,0,0,1); backdrop-filter: blur(15px); z-index: 10;
        }

        h1 { color: #ffffff; margin: 0 0 5px; font-size: 24px; font-weight: 700; }
        p { color: #999999; margin-bottom: 30px; font-size: 13px; text-transform: uppercase; letter-spacing: 2.5px; }
        
        .btn { 
            display: flex; align-items: center; justify-content: center; 
            background: #d1d1d1; color: #000000; padding: 15px; margin: 15px 0; 
            border-radius: 15px; text-decoration: none; font-weight: 700; font-size: 16px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .btn:hover { background: #ffffff; transform: scale(1.05); box-shadow: 0 10px 30px rgba(255,255,255,0.1); }
        .btn i { margin-right: 12px; font-size: 18px; width: 25px; text-align: center; }
        
        .btn:hover .fa-whatsapp { color: #25D366; }
        .btn:hover .fa-instagram { color: #E1306C; }
        .btn:hover .fa-facebook { color: #1877F2; }
        .btn:hover .fa-globe { color: #007bff; }
        .btn:hover .fa-address-book { color: #4285F4; } /* Google Mavisi */
    </style>
</head>
<body>

    <div class="particles">
        <div class="particle" style="width:2px; height:2px; left:10%; top:90%; animation-duration:15s;"></div>
        <div class="particle" style="width:3px; height:3px; left:30%; top:80%; animation-duration:25s; animation-delay:2s;"></div>
        <div class="particle" style="width:1px; height:1px; left:70%; top:70%; animation-duration:20s; animation-delay:5s;"></div>
        <div class="particle" style="width:2px; height:2px; left:50%; top:100%; animation-duration:18s; animation-delay:1s;"></div>
    </div>

    <div class="card">
        <h1>Nezih Zambakcı</h1>
        <p>Makine Mühendisi</p>
        
        <a href="HAKİKİ_GOOGLE_LINKI_BURAYA" target="_blank" class="btn">
            <i class="fas fa-address-book"></i> Rehbere Kaydet
        </a>
        
        <a href="https://wa.me/905427877284" target="_blank" class="btn">
            <i class="fab fa-whatsapp"></i> WhatsApp Mesaj
        </a>

        <a href="https://www.instagram.com/___nezih___" target="_blank" class="btn">
            <i class="fab fa-instagram"></i> Instagram
        </a>

        <a href="https://www.facebook.com/profile.php?id=100002504262680&locale=tr_TR" target="_blank" class="btn">
            <i class="fab fa-facebook"></i> Facebook
        </a>

        <a href="http://www.prsmakina.com" target="_blank" class="btn">
            <i class="fas fa-globe"></i> Web Adresi
        </a>
    </div>

</body>
</html>
